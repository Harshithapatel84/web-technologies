<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5 d-flex justify-content-center align-items-center" style="min-height: 100vh;">
   
    <div class="card shadow p-4" style="width: 600px;">
        <h2 class="text-center text-primary mb-4">Room Booking Form</h2>

        <form name="RegistrationForm" onsubmit="return validation()">

            <div class="mb-3">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" name="fullName">
            </div>

            <div class="mb-3">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" name="email">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone *</label>
                <input type="tel" class="form-control" name="phone">
            </div>

            <div class="mb-3">
                <label class="form-label">Days Required</label>
                <input type="number" class="form-control" name="days">
            </div>

            <div class="mb-3">
                <label class="form-label">Room Type *</label>
                <select class="form-select" name="roomType">
                    <option value="">Select Room</option>
                    <option>Deluxe</option>
                    <option>AC</option>
                    <option>Non-AC</option>
                    <option>Suite</option>
                </select>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary me-2">Book Now</button>
                <button type="reset" class="btn btn-secondary">Cancel</button>
            </div>

        </form>
    </div>
</div>

<!-- Link external JS -->
<script src="script.js"></script>

</body>
</html>
