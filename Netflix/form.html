
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
</head>
<body>

<form>
    <h1>Application Form</h1><hr>

    <div>Name: <input type="text" name="name"></div><br>

    <div>Email: <input type="email" name="email"></div><br>

    <div>Phone Number: <input type="tel" name="phone"></div><br>

    <div>Password: <input type="password" name="password"></div><br>

    <div>Date of Birth: <input type="date" name="dob"></div><br>

    <div>Gender: 
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female</div><br>

    <div>Upload content: 
        <input type="file" name="content"></div><br>

    <div><input type="submit" value="Submit">
    <input type="reset" value="Cancel"></div>

</form>

</body>
</html>
