<!DOCTYPE html>
<html>

<head>
    <title>game selection Form</title>
</head>

<body>

    <form>

        <h1>Game Selection Form</h1>
        <hr>

        <div>
            Name :
            <input type="text" name="nameofUser" id="userId" required><span>*</span>
        </div><br>

        <div>
            E-mail :
            <input type="email" name="mailname" id="mailId" required><span>*</span>
        </div><br>

        <div>
            Age :
            <input type="number" name="AgeNumber" id="ageId">
        </div><br>

        <div>
            Search :
            <input type="search" name="gameSearch" id="searchId">
        </div><br>

        <div>
            Time :
            <input type="time" name="gameTime" id="gameId">
        </div><br>

        <div>
            <input type="submit" value="Submit">
            <input type="reset" value="Cancel">
        </div>

    </form>

</body>

</html>
