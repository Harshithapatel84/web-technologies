<!DOCTYPE html>
<html>

<head>
    <title>Job Application Form</title>
</head>

<body>

    <h1>Job Application Form</h1><hr>

    <form>
        <fieldset>

        <div> Full Name: 
            <input type="text" name="fullname"></div><br>

        <div> Address: 
            <input name="address"></input></div><br>

        <div>
        Select Position:
        <select name="position">
            <option>Developer</option>
            <option>Tester</option>
            <option>Designer</option>
        </select></div><br>

        <div>
        Skills:
        <input type="checkbox" name="skill"> Java
        <input type="checkbox" name="skill"> Python
        <input type="checkbox" name="skill"> HTML </div><br>


        <div> Expected Salary: 
            <input type="number" name="salary"></div><br>

        <div> Available Time: 
            <input type="time" name="time"> </div><br>

        <div> LinkedIn Link: 
            <input type="url" name="LinkedIn"></div><br>

        <div> <input type="submit" value="Apply">
            <input type="reset" value="Clear">
        </div>
        </fieldset>

    </form>

</body>

</html>
