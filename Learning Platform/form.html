<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>

    <form>
        <fieldset>
        <h1> online Registration Form</h1>
        <hr>

        <div>
            Name <span>*</span> :
            <input type="text" name="nameOfPerson" id="nameId" required>
        </div><br>

        <div>
            E-mail <span>*</span>
            <span>:</span>
            <input type="email" name="emailName" id="emailId" required>
        </div><br>

        <div>
            Password <span>*</span>
            <span>:</span>
            <input type="password" name="passwordName" id="passwordId" required>
        </div><br>

        <div>
            Joining Month <span>:</span>
            <input type="month" name="monthName" id="monthId">
        </div><br>

        <div>
            Age <span>:</span>
            <input type="number" name="age" id="ageId">
        </div><br>

        <div>
            <input type="checkbox" name="terms" id="termsId">
            Agree and Continue
        </div><br>

        <div>
            <input type="submit" value="Submit">
            <input type="reset" value="Cancel">
        </div>
        </fieldset>

    </form>

</body>

</html>
